    <h1> Add a New Course</h1>
    <form>

    <!--مفروض نغيير شكل الخط -->
    
    <label for="CeadietHours" > Creadit Hours: </label>
    <input type="number" id="CeadietHours" min="1"  name="ceadiet-hours"  required  placeholder="Enter Creadit Hours  "> 
    <!--مفروض نغيير شكل الخط -->

    <label for="CourseCode " >Course Code :  </label>
    <input type="text" id="CourseCode" name="course-code"  required  placeholder="Enter Course Code">
   <label for="Notes " >Notes :  </label>
